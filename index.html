<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bodega do Bira</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(to bottom, #1a0d00, #000000);
    color: white;
    overflow-x: hidden;
}

/* TOPO */
.top-bar {
    background: linear-gradient(90deg, #ff8800, #ff3300);
    padding: 15px;
    text-align: center;
    font-weight: bold;
}

/* BADGE AO VIVO */
.live {
    display: inline-block;
    background: red;
    padding: 6px 20px;
    border-radius: 20px;
    font-size: 14px;
    font-weight: bold;
    animation: blink 1s infinite;
    box-shadow: 0 0 10px red;
}

@keyframes blink {
    50% { opacity: 0.3; }
}

/* BOTÃO DISCORD */
.discord-top {
    margin-left: 20px;
    background: #5865F2;
    color: white;
    padding: 8px 18px;
    border-radius: 30px;
    text-decoration: none;
    font-weight: bold;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    animation: pulse 2s infinite;
}

@keyframes pulse {
    0% { box-shadow: 0 0 0 0 rgba(88,101,242, 0.7); }
    70% { box-shadow: 0 0 0 15px rgba(88,101,242, 0); }
    100% { box-shadow: 0 0 0 0 rgba(88,101,242, 0); }
}

/* HERO */
.hero {
    text-align: center;
    padding: 120px 20px;
}

.hero h1 {
    font-size: 60px;
    background: linear-gradient(90deg, #ffcc00, #ff6600);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: neon 3s infinite alternate;
}

@keyframes neon {
    from { text-shadow: 0 0 10px #ff6600; }
    to { text-shadow: 0 0 30px #ffcc00; }
}

.hero p {
    font-size: 22px;
    color: #ccc;
}

/* PLAYLIST */
.playlist {
    max-width: 900px;
    margin: 40px auto;
    text-align: center;
}

/* COPOS DE CERVEJA */
.beer {
    position: fixed;
    bottom: -100px;
    font-size: 30px;
    animation: floatBeer linear infinite;
    opacity: 0.15;
    z-index: -1;
}

@keyframes floatBeer {
    from {
        transform: translateY(0) rotate(0deg);
    }
    to {
        transform: translateY(-120vh) rotate(360deg);
    }
}

footer {
    text-align: center;
    padding: 30px;
    color: #777;
}
</style>
</head>

<body>

<div class="top-bar">
    🔴 <span class="live">DJ BIRA AO VIVO 🎧</span>

    <a href="https://discord.gg/tUf6tkpRH9" target="_blank" class="discord-top">
        <img src="https://cdn-icons-png.flaticon.com/512/2111/2111370.png" width="22">
        Entrar no Discord
    </a>
</div>

<section class="hero">
<h1>BODEGA DO BIRA</h1>
<p>Conectada em você 🍺🎧</p>
</section>

<section class="playlist">
<h2>🎶 Nossa Playlist</h2>
<iframe width="100%" height="400"
src="https://www.youtube.com/embed/videoseries?list=PLs7IiTClOZVF2w1Kkmt4FxuAiwZDddpMj"
frameborder="0"
allow="autoplay; encrypted-media"
allowfullscreen>
</iframe>
</section>

<footer>
© 2026 Bodega do Bira - Todos os direitos reservados
</footer>

<script>
const emojis = ["🍺","🍻","🥃"];
const totalBeers = 20;

for (let i = 0; i < totalBeers; i++) {
    const beer = document.createElement("div");
    beer.classList.add("beer");
    beer.innerHTML = emojis[Math.floor(Math.random() * emojis.length)];
    beer.style.left = Math.random() * 100 + "vw";
    beer.style.animationDuration = (10 + Math.random() * 15) + "s";
    beer.style.fontSize = (20 + Math.random() * 30) + "px";
    document.body.appendChild(beer);
}
</script>

</body>
</html>
