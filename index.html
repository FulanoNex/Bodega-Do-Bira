<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bodega do Bira</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #0f001a;
    color: white;
    overflow-x: hidden;
}

/* FUNDO ESTRELAS */
body::before {
    content: "";
    position: fixed;
    width: 200%;
    height: 200%;
    background-image: radial-gradient(white 1px, transparent 1px);
    background-size: 40px 40px;
    opacity: 0.05;
    animation: moveStars 60s linear infinite;
    z-index: -1;
}

@keyframes moveStars {
    from { transform: translate(0,0); }
    to { transform: translate(-500px,-500px); }
}

/* TOPO PLAYER */
.top-bar {
    background: linear-gradient(90deg, #ff00cc, #7b00ff);
    padding: 15px;
    text-align: center;
    font-weight: bold;
}

/* BADGE AO VIVO */
.live {
    display: inline-block;
    background: red;
    padding: 6px 15px;
    border-radius: 20px;
    font-size: 12px;
    animation: blink 1s infinite;
}

@keyframes blink {
    50% { opacity: 0.3; }
}

/* HERO */
.hero {
    text-align: center;
    padding: 120px 20px;
}

.hero h1 {
    font-size: 60px;
    background: linear-gradient(90deg, #ff00cc, #00ffff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: neon 3s infinite alternate;
}

@keyframes neon {
    from { text-shadow: 0 0 10px #ff00cc; }
    to { text-shadow: 0 0 30px #00ffff; }
}

.hero p {
    font-size: 22px;
    color: #aaa;
}

/* PLAYLIST */
.playlist {
    max-width: 900px;
    margin: 40px auto;
    text-align: center;
}

/* WHATSAPP */
.whatsapp {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: #25D366;
    color: white;
    padding: 15px 18px;
    border-radius: 50%;
    font-size: 22px;
    text-decoration: none;
    box-shadow: 0 0 15px #25D366;
}

footer {
    text-align: center;
    padding: 30px;
    color: #777;
}
</style>
</head>

<body>

<div class="top-bar">
🔴 <span class="live">AO VIVO</span> - Rádio Bodega do Bira 24/7
</div>

<section class="hero">
<h1>BODEGA DO BIRA</h1>
<p>Conectada em você 🎧</p>
</section>

<section class="playlist">
<h2>🎶 Nossa Playlist</h2>
<iframe width="100%" height="400"
src="https://www.youtube.com/embed/videoseries?list=PLs7IiTClOZVF2w1Kkmt4FxuAiwZDddpMj&autoplay=1"
frameborder="0"
allow="autoplay; encrypted-media"
allowfullscreen>
</iframe>
</section>

<a class="whatsapp" href="https://wa.me/SEUNUMEROAQUI" target="_blank">💬</a>

<footer>
© 2026 Bodega do Bira - Todos os direitos reservados
</footer>

</body>
</html>
