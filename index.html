<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bodega do Bira</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(to bottom, #1a0d00, #000000);
    color: white;
    overflow-x: hidden;
    position: relative;
}

/* LUZ BALADA */
.light-effect {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle at center, rgba(255,0,150,0.2), transparent 70%);
    animation: luzBalada 4s infinite alternate;
    pointer-events: none;
    z-index: 1;
}

@keyframes luzBalada {
    0% { background: radial-gradient(circle at center, rgba(255,0,150,0.2), transparent 70%); }
    50% { background: radial-gradient(circle at center, rgba(0,150,255,0.2), transparent 70%); }
    100% { background: radial-gradient(circle at center, rgba(255,100,0,0.2), transparent 70%); }
}

/* FUMAÇA */
.smoke {
    position: fixed;
    bottom: -100px;
    width: 200px;
    height: 200px;
    background: radial-gradient(circle, rgba(255,255,255,0.15), transparent 70%);
    border-radius: 50%;
    animation: subirFumaca 25s linear infinite;
    pointer-events: none;
    z-index: 0;
}

@keyframes subirFumaca {
    from {
        transform: translateY(0) scale(1);
        opacity: 0.2;
    }
    to {
        transform: translateY(-120vh) scale(1.8);
        opacity: 0;
    }
}

/* TOPO */
.top-bar {
    background: linear-gradient(90deg, #ff8800, #ff3300);
    padding: 15px;
    text-align: center;
    font-weight: bold;
    position: relative;
    z-index: 2;
}

.live {
    display: inline-block;
    background: red;
    padding: 6px 20px;
    border-radius: 20px;
    animation: blink 1s infinite;
}

@keyframes blink {
    50% { opacity: 0.3; }
}

/* HERO */
.hero {
    text-align: center;
    padding: 60px 20px;
    position: relative;
    z-index: 2;
}

/* MINI PLAYER */
.video-box {
    width: 220px;
    margin: 20px auto;
}
.video-box iframe {
    width: 100%;
    height: 130px;
    border-radius: 12px;
}

/* EQUALIZADOR */
.equalizer {
    display: flex;
    justify-content: center;
    gap: 6px;
    margin: 20px 0;
}
.bar {
    width: 6px;
    height: 20px;
    background: #ff6600;
    animation: bounce 1.2s infinite ease-in-out;
}
.bar:nth-child(2){animation-delay:.2s;}
.bar:nth-child(3){animation-delay:.4s;}
.bar:nth-child(4){animation-delay:.6s;}
.bar:nth-child(5){animation-delay:.8s;}

@keyframes bounce {
    0%,100%{height:20px;}
    50%{height:45px;}
}

/* COPOS */
.beer {
    position: fixed;
    bottom: -80px;
    font-size: 26px;
    animation: subir 20s linear infinite;
    opacity: 0.12;
    pointer-events: none;
    z-index: 0;
}

@keyframes subir {
    from { transform: translateY(0) rotate(0deg); }
    to { transform: translateY(-120vh) rotate(360deg); }
}

footer {
    text-align: center;
    padding: 30px;
    color: #777;
    position: relative;
    z-index: 2;
}
</style>
</head>

<body>

<div class="light-effect"></div>

<div class="top-bar">
🔴 <span class="live">DJ BIRA AO VIVO 🎧</span>
</div>

<section class="hero">
<h1>BODEGA DO BIRA 🍺</h1>

<div class="video-box">
<iframe src="https://www.youtube.com/embed/videoseries?list=PLs7IiTClOZVF2w1Kkmt4FxuAiwZDddpMj"></iframe>
</div>

<div class="equalizer">
<div class="bar"></div>
<div class="bar"></div>
<div class="bar"></div>
<div class="bar"></div>
<div class="bar"></div>
</div>

<div id="ouvintes">👥 128 ouvindo agora</div>
</section>

<footer>
© 2026 Bodega do Bira - Todos os direitos reservados
</footer>

<script>

/* CONTADOR */
setInterval(()=>{
let numero=Math.floor(Math.random()*40)+110;
document.getElementById("ouvintes").textContent="👥 "+numero+" ouvindo agora";
},6000);

/* COPOS */
const emojis=["🍺","🍻","🥃"];
for(let i=0;i<12;i++){
let beer=document.createElement("div");
beer.classList.add("beer");
beer.innerHTML=emojis[Math.floor(Math.random()*emojis.length)];
beer.style.left=Math.random()*100+"vw";
beer.style.animationDuration=(18+Math.random()*15)+"s";
beer.style.fontSize=(20+Math.random()*25)+"px";
document.body.appendChild(beer);
}

/* FUMAÇA */
for(let i=0;i<5;i++){
let smoke=document.createElement("div");
smoke.classList.add("smoke");
smoke.style.left=Math.random()*100+"vw";
smoke.style.animationDuration=(20+Math.random()*20)+"s";
document.body.appendChild(smoke);
}

</script>

</body>
</html>
