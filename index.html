<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bodega do Bira</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: radial-gradient(circle at top left, #1a0026, #000);
    color: white;
    overflow-x: hidden;
}

/* TOPO PLAYER */
.top-player {
    background: linear-gradient(90deg, #ff0077, #7b00ff);
    padding: 15px;
    text-align: center;
    font-weight: bold;
}

/* MENU */
header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 40px;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(10px);
}

.logo {
    font-size: 22px;
    font-weight: bold;
    background: linear-gradient(90deg, #ff00cc, #00ffff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

nav a {
    color: #ccc;
    text-decoration: none;
    margin-left: 20px;
    transition: 0.3s;
}

nav a:hover {
    color: #ff00cc;
}

/* HERO */
.hero {
    text-align: center;
    padding: 120px 20px;
}

.hero h1 {
    font-size: 70px;
    margin: 0;
    background: linear-gradient(90deg, #ff00cc, #00ffff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.hero h2 {
    font-size: 30px;
    color: #aaa;
    margin-top: 10px;
}

.live-badge {
    display: inline-block;
    background: #ff0055;
    padding: 8px 20px;
    border-radius: 30px;
    margin-bottom: 20px;
    font-size: 14px;
}

/* PLAYLIST */
.playlist {
    max-width: 900px;
    margin: 60px auto;
    text-align: center;
}

/* FOOTER */
footer {
    text-align: center;
    padding: 30px;
    background: rgba(0,0,0,0.7);
    color: #777;
}

/* RESPONSIVO */
@media (max-width: 768px) {
    .hero h1 {
        font-size: 40px;
    }
}
</style>
</head>

<body>

<div class="top-player">
🎧 Rádio Bodega do Bira - Ao Vivo 24/7
</div>

<header>
<div class="logo">Bodega do Bira</div>
<nav>
<a href="#">Início</a>
<a href="#">Programação</a>
<a href="#">Pedidos</a>
<a href="#">Contato</a>
</nav>
</header>

<section class="hero">
<div class="live-badge">🔴 AO VIVO 24/7</div>
<h1>BODEGA DO BIRA</h1>
<h2>Conectada em você</h2>
</section>

<section class="playlist">
<h2>🎶 Nossa Playlist</h2>
<iframe width="100%" height="400"
src="https://www.youtube.com/embed/videoseries?list=PLs7IiTClOZVF2w1Kkmt4FxuAiwZDddpMj&autoplay=1"
frameborder="0"
allow="autoplay; encrypted-media"
allowfullscreen>
</iframe>
</section>

<footer>
© 2026 Bodega do Bira - Todos os direitos reservados
</footer>

</body>
</html>
